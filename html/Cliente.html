<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="../css/Cliente.css">
</head>
<body>

    <div class="ventana-registro">
        
        <div class="barra-superior">
            <h2>Regístrate</h2>
            <span class="boton-cerrar">&times;</span>
        </div>

        <form class="formulario-cuerpo">
            
            <div class="grupo-campo completo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ingrese tu nombre" required>
            </div>

            <div class="fila-doble">
                <div class="grupo-campo">
                    <label for="primer-apellido">Primer Apellido:</label>
                    <input type="text" id="primer-apellido" placeholder="Ingrese tu primer apellido" required>
                </div>
                <div class="grupo-campo">
                    <label for="segundo-apellido">Segundo Apellido:</label>
                    <input type="text" id="segundo-apellido" placeholder="Ingrese tu segundo apellido">
                </div>
            </div>

            <div class="grupo-campo completo">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" placeholder="Ingrese tu E-mail" required>
            </div>

            <div class="fila-doble">
                <div class="grupo-campo">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" placeholder="Ingrese tu nº de teléfono" required>
                </div>
                <div class="grupo-campo">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" placeholder="Ingrese tu edad" min="0">
                </div>
            </div>

            <button type="submit" class="boton-registrate">Regístrate</button>

        </form>
    </div>

</body>
</html>
